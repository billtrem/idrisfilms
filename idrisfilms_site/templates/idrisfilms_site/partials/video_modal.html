<div class="video-modal" data-video-modal hidden>
  <button class="video-modal__backdrop" type="button" data-modal-close aria-label="Close video"></button>

  <div class="video-modal__panel" role="dialog" aria-modal="true" aria-labelledby="video-modal-title">
    <div class="video-modal__top">
      <h2 id="video-modal-title" data-modal-title>Video</h2>
      <button class="video-modal__close" type="button" data-modal-close>Close</button>
    </div>

    <div class="video-modal__frame">
      <iframe
        data-modal-iframe
        src=""
        title=""
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</div>
